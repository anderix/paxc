# Dependabot keeps cargo dependencies current so security fixes show up
# as PRs rather than slipping past. Add a github-actions ecosystem entry
# when a workflow lands under .github/workflows/.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
